name = "hbi-aad"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Dev server
[dev]
port = 3000

# ─── Durable Object for atomic state (strong consistency) ───
[[durable_objects.bindings]]
name = "ATOMIC_STORE_DO"
class_name = "AtomicStoreDO"

# ─── Durable Object for alarm-based scheduler (cron simulation) ───
[[durable_objects.bindings]]
name = "ALARM_TIMER_DO"
class_name = "AlarmTimerDO"

# ─── Durable Object for WebSocket notification broadcast ───
[[durable_objects.bindings]]
name = "NOTIFICATION_DO"
class_name = "NotificationDO"

# ─── Durable Object for real-time container log streaming ───
[[durable_objects.bindings]]
name = "LOG_STREAM_DO"
class_name = "LogStreamDO"

[[migrations]]
tag = "v1"
new_classes = ["AtomicStoreDO"]

[[migrations]]
tag = "v2-alarm"
new_classes = ["AlarmTimerDO"]

[[migrations]]
tag = "v5-realtime"
new_classes = ["NotificationDO"]

[[migrations]]
tag = "v6-logstream"
new_classes = ["LogStreamDO"]

# ─── KV for state storage (eventual consistency fallback) ───
[[kv_namespaces]]
binding = "KV_STORE"
id = "local-dev"

# ─── D1 for relational queries ───
[[d1_databases]]
binding = "QUERY_DB"
database_name = "hbi-aad-db"
database_id = "local-dev"

# ─── R2 for blob storage ───
[[r2_buckets]]
binding = "BLOB_STORE"
bucket_name = "hbi-aad-blobs"

# ─── Cloudflare Queues — async task dispatch (image pull, sandbox GC) ───
# Producer: Worker sends tasks to the queue
[[queues.producers]]
binding = "TASK_QUEUE"
queue = "hbi-aad-tasks"

# Consumer: Worker receives & processes queued tasks
[[queues.consumers]]
queue = "hbi-aad-tasks"
max_batch_size = 5
max_batch_timeout = 10          # seconds — Miniflare default is 1s; set longer for dev batching
max_retries = 3                 # messages that fail 3× are dropped (unless DLQ configured)
# dead_letter_queue = "hbi-aad-dlq"  # uncomment after creating the DLQ in production

# In wrangler dev, queues run locally via Miniflare — no Cloudflare account needed.
# Consumer fires within max_batch_timeout (10s) after the first message arrives.
# In production, the queue must be created first:
#   npx wrangler queues create hbi-aad-tasks

[env.production]
# Production overrides — set real IDs via `wrangler secret` and `wrangler deploy --env production`
