# category: service
# tags: nginx, web, singleton
name: "nginx"
description: "Nginx web server — ports 80, readiness check, singleton"
apiVersion: "hbi-aad/v1"
kind: "Pod"
singleton: true
spec:
  metadata:
    name: "nginx"
  spec:
    containers:
      - name: "nginx"
        image: "docker.io/library/nginx:latest"
        command:
          - "nginx"
        args:
          - "-g"
          - "daemon off;"
        ports:
          - containerPort: 80
            protocol: "TCP"
        resources:
          limits:
            cpu: 0.5
            memory: 128
        livenessProbe:
          httpGet:
            path: "/"
            port: 80
          periodSeconds: 10
          initialDelaySeconds: 5
        readinessProbe:
          tcpSocket:
            port: 80
          periodSeconds: 5
          initialDelaySeconds: 2
    restartPolicy: "Always"
  providerOverrides:
    alibaba:
      region: "local"
