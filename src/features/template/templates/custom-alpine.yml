# category: os
# tags: alpine, custom, dag
name: "custom-alpine"
description: "Custom Alpine — inherits base-alpine, adds curl + env vars"
apiVersion: "hbi-aad/v1"
kind: "Pod"
dependsOn:
  - "base-alpine"
spec:
  metadata:
    name: "custom-alpine"
  spec:
    containers:
      - name: "alpine"
        command:
          - "sh"
          - "-c"
          - "while true; do echo \"Hello from DAG\"; curl -s http://localhost/health 2>/dev/null || echo \"nginx not ready\"; sleep 10; done"
        env:
          - name: "APP_ENV"
            value: "development"
          - name: "LOG_LEVEL"
            value: "debug"
    restartPolicy: "Never"
  providerOverrides:
    alibaba:
      region: "local"
