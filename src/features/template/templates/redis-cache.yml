# category: middleware
# tags: redis, cache, alpine, tcp
name: "redis-cache"
description: "Redis 7 缓存服务 — 无持久化，适合 session / 缓存场景"
apiVersion: "hbi-aad/v1"
kind: "Pod"
spec:
  metadata:
    name: "redis-cache"
  spec:
    containers:
      - name: "redis"
        image: "docker.io/library/redis:7-alpine"
        command:
          - "redis-server"
          - "--save"
          - ""
          - "--appendonly"
          - "no"
        resources:
          limits:
            cpu: 0.5
            memory: 512
        ports:
          - containerPort: 6379
            protocol: "TCP"
        livenessProbe:
          tcpSocket:
            port: 6379
          periodSeconds: 10
          initialDelaySeconds: 5
    restartPolicy: "Always"
  providerOverrides:
    alibaba:
      region: "cn-hangzhou"
