# category: demo
# tags: pod, docker-compose, v2, multi-container
name: "demo-pod"
description: "Pod — nginx + alpine 共享网络"
apiVersion: "hbi-aad/v1"
kind: "Pod"
spec:
  metadata:
    name: "demo-pod"
  spec:
    containers:
      - name: "demo-pod-web"
        image: "docker.io/library/nginx:latest"
        command:
          - "nginx"
          - "-g"
          - "daemon off;"
        ports:
          - containerPort: 80
            protocol: "TCP"
        resources:
          limits:
            cpu: 0.5
            memory: 128
      - name: "demo-pod-sidecar"
        image: "docker.io/library/alpine:latest"
        command:
          - "sh"
          - "-c"
          - "while true; do echo \"sidecar alive\"; sleep 30; done"
        resources:
          limits:
            cpu: 0.25
            memory: 64
    restartPolicy: "Never"
  providerOverrides:
    alibaba:
      region: "local"
