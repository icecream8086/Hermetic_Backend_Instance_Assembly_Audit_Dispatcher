# 第四部分: DAG 系统能力边界与路线图
# ═══════════════════════════════════════════════════════════════

dag_system:

  implemented:
    - DagDef/DagRun/TaskInstance 三层实体
    - 12 态 TaskInstance 状态机 (NRI+PBT 验证)
    - 4 态 DagRun + 聚合规则 (TLA+ 验证)
    - 9 规则 TriggerRule 引擎 (TLA+ 穷举)
    - 5 步过滤管线 + ConcurrencyMap (TLA+ 确定性验证)
    - Pool 信号量 (default_pool=128)
    - ApprovalSensor 审批门
    - Runner 注册/心跳/下线
    - Secret AES-256-GCM 加密
    - YAML DSL → DagDef 编译器
    - DAG 可视化端点 GET /runs/:id/dag → { nodes, edges }
    - CG 生命周期 11 态 + GC (4/6 路径)

  gaps:
    - severity: MEDIUM
      title: TaskInstance logs → 501 空壳
    - severity: MEDIUM
      title: CG GC 缺 provider-gone + expired-gc 两条路径
    - severity: LOW
      title: Cross-consistency C6 未强制 (CG=Deleted ⇒ TI terminal)

  future_operators:
    - title: webhook 操作类型
      purpose: 外部节点 (日志/Watchdog/压测/性能服务器) 通过 OpenAPI 接入 DAG
      needs:
        - PATCH taskInstance (状态变更 + 执行结果)
        - POST taskInstance logs (外部写日志)
        - 复用现有 Runner 注册/心跳认证

  frontend_guide:
    - DAG 视图: GET /runs/:id/dag → nodes + edges + 实时状态
    - 模板编辑: 资源从 /api/networks /api/volumes /api/subnets /api/instances 拉
    - v1→v2 迁移: region/account/instanceId/zone → providerOverrides.alibaba.*
      healthChecks → per-container probes, network → GET /pods/:id 查询

